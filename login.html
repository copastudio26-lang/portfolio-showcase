{% extends "base.html" %}
{% block title %}Admin Login — Ajay Dev{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-accent rounded-2xl flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold">Admin Access</h1>
      <p class="text-gray-500 text-sm mt-1 font-mono">Restricted area</p>
    </div>

    <!-- Form -->
    <div class="bg-card border border-border rounded-2xl p-8">
      {% if error %}
      <div class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm px-4 py-3 rounded-lg mb-6">
        {{ error }}
      </div>
      {% endif %}

      <div class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Username</label>
          <input type="text" name="username" id="username" required autofocus
            class="w-full bg-surface border border-border rounded-lg px-4 py-3 text-gray-200 placeholder-gray-600 focus:outline-none focus:border-accent transition font-mono"
            placeholder="ajay">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
          <div class="relative">
            <input type="password" name="password" id="password" required
              class="w-full bg-surface border border-border rounded-lg px-4 py-3 text-gray-200 placeholder-gray-600 focus:outline-none focus:border-accent transition font-mono pr-12"
              placeholder="••••••••">
            <button type="button" onclick="togglePwd()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="button" onclick="doLogin()"
          class="w-full bg-accent text-white py-3 rounded-lg font-semibold hover:bg-purple-700 transition mt-2">
          Sign In →
        </button>
      </div>
    </div>

    <p class="text-center text-gray-600 text-xs mt-6 font-mono">Default: ajay / admin123 (change in env)</p>
  </div>
</div>

<!-- Hidden form for POST submit -->
<form id="login-form" method="POST" action="{{ url_for('admin_login') }}" style="display:none">
  <input type="hidden" name="username" id="h-user">
  <input type="hidden" name="password" id="h-pass">
</form>
{% endblock %}

{% block scripts %}
<script>
function doLogin() {
  document.getElementById('h-user').value = document.getElementById('username').value;
  document.getElementById('h-pass').value = document.getElementById('password').value;
  document.getElementById('login-form').submit();
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function togglePwd() {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
