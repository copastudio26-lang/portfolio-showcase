{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center text-center px-4">
  <div>
    <p class="font-mono text-8xl font-bold text-accent/30 mb-4">404</p>
    <h1 class="text-3xl font-bold mb-3">Page Not Found</h1>
    <p class="text-gray-500 mb-8">The page you're looking for doesn't exist or has been moved.</p>
    <a href="{{ url_for('index') }}" class="btn-primary">← Go Home</a>
  </div>
</div>
{% endblock %}
